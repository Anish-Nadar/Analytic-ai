<!DOCTYPE html>
<html>
<head>
    <title>Dataset Cleaner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }
        .upload-area.dragover {
            background: #e8ecff;
            border-color: #764ba2;
            transform: scale(1.02);
        }
        .upload-area p { color: #666; font-size: 16px; margin-bottom: 10px; }
        .upload-area .file-input { display: none; }
        #fileInput { display: none; }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        #status {
            text-align: center;
            margin: 20px 0;
            font-size: 16px;
            font-weight: bold;
        }
        .status-success { color: #27ae60; }
        .status-error { color: #e74c3c; }
        .status-loading { color: #667eea; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .report {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
            display: none;
        }
        .report.show { display: block; }
        .report h3 { color: #333; margin-bottom: 15px; }
        .report-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .report-item:last-child { border-bottom: none; }
        .report-label { color: #666; font-weight: 500; }
        .report-value { color: #667eea; font-weight: bold; }
        .preview {
            margin-top: 30px;
            display: none;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .preview.show { display: block; }
        .preview table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .preview th {
            background: #667eea;
            color: white;
            padding: 10px;
            text-align: left;
            position: sticky;
            top: 0;
        }
        .preview td {
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
        }
        .preview tr:nth-child(even) { background: #f9f9f9; }
        .download-btn {
            display: inline-block;
            margin-top: 20px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-card .value { font-size: 24px; font-weight: bold; }
        .stat-card .label { font-size: 12px; margin-top: 5px; opacity: 0.9; }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 Dataset Cleaner</h1>

        <div class="upload-area" id="uploadArea">
            <p>📁 Drag & drop your CSV here</p>
            <p style="font-size: 14px; color: #999;">or click to browse</p>
            <input type="file" id="fileInput" accept=".csv" />
        </div>

        <button class="btn" id="cleanBtn" disabled>Clean Dataset</button>

        <div id="status"></div>

        <div class="stats" id="stats"></div>

        <div class="report" id="report"></div>

        <div class="preview" id="preview">
            <table id="previewTable">
                <thead id="previewHead"></thead>
                <tbody id="previewBody"></tbody>
            </table>
        </div>

        <a class="btn download-btn" id="downloadBtn" style="display: none;">⬇️ Download Cleaned CSV</a>
    </div>

    <script>
        const uploadArea = document.getElementById("uploadArea");
        const fileInput = document.getElementById("fileInput");
        const cleanBtn = document.getElementById("cleanBtn");
        const status = document.getElementById("status");
        const report = document.getElementById("report");
        const preview = document.getElementById("preview");
        const stats = document.getElementById("stats");
        const downloadBtn = document.getElementById("downloadBtn");
        let cleanedBlob = null;

        // File upload
        uploadArea.addEventListener("click", () => fileInput.click());

        fileInput.addEventListener("change", (e) => {
            if (e.target.files.length > 0) {
                cleanBtn.disabled = false;
                uploadArea.textContent = "✅ " + e.target.files[0].name + " selected";
            }
        });

        // Drag and drop
        uploadArea.addEventListener("dragover", (e) => {
            e.preventDefault();
            uploadArea.classList.add("dragover");
        });

        uploadArea.addEventListener("dragleave", () => {
            uploadArea.classList.remove("dragover");
        });

        uploadArea.addEventListener("drop", (e) => {
            e.preventDefault();
            uploadArea.classList.remove("dragover");
            fileInput.files = e.dataTransfer.files;
            if (fileInput.files.length > 0) {
                cleanBtn.disabled = false;
                uploadArea.textContent = "✅ " + fileInput.files[0].name + " selected";
            }
        });

        // Clean dataset
        cleanBtn.addEventListener("click", async () => {
            const file = fileInput.files[0];
            if (!file) return;

            cleanBtn.disabled = true;
            status.className = "status-loading";
            status.innerText = "⏳ Cleaning dataset...";
            report.classList.remove("show");
            preview.classList.remove("show");
            downloadBtn.style.display = "none";

            const formData = new FormData();
            formData.append("file", file);

            try {
                const response = await fetch("/clean", {
                    method: "POST",
                    body: formData
                });

                if (response.ok) {
                    cleanedBlob = await response.blob();

                    // Extract report headers
                    const headers = {
                        duplicates: response.headers.get("X-Duplicates-Removed") || "0",
                        empty_rows: response.headers.get("X-Empty-Rows-Removed") || "0",
                        empty_cols: response.headers.get("X-Empty-Columns-Removed") || "0",
                        numeric_filled: response.headers.get("X-Numeric-Filled") || "0",
                        categorical_filled: response.headers.get("X-Categorical-Filled") || "0",
                        high_missing: response.headers.get("X-High-Missing-Columns") || ""
                    };

                    displayStats(headers);
                    displayPreview(cleanedBlob);

                    status.className = "status-success";
                    status.innerText = "✅ Cleaning complete!";
                    downloadBtn.style.display = "inline-block";
                } else {
                    const error = await response.json();
                    status.className = "status-error";
                    status.innerText = "❌ Error: " + (error.error || "Unknown error");
                }
            } catch (err) {
                status.className = "status-error";
                status.innerText = "❌ Network error: " + err.message;
            }

            cleanBtn.disabled = false;
        });

        function displayStats(headers) {
            const statItems = [
                { label: "Duplicates Removed", value: headers.duplicates },
                { label: "Empty Rows Removed", value: headers.empty_rows },
                { label: "Empty Columns Removed", value: headers.empty_cols },
                { label: "Numeric Values Filled", value: headers.numeric_filled },
                { label: "Categorical Values Filled", value: headers.categorical_filled }
            ];

            stats.innerHTML = statItems.map(s => `
                <div class="stat-card">
                    <div class="value">${s.value}</div>
                    <div class="label">${s.label}</div>
                </div>
            `).join("");
        }

        function displayPreview(blob) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const csv = e.target.result;
                const lines = csv.split("\n").filter(l => l.trim());
                if (lines.length === 0) return;

                const headers = lines[0].split(",");
                const rows = lines.slice(1, 6).map(l => l.split(","));

                const thead = document.getElementById("previewHead");
                const tbody = document.getElementById("previewBody");

                thead.innerHTML = "<tr>" + headers.map(h => `<th>${h}</th>`).join("") + "</tr>";
                tbody.innerHTML = rows.map(r => `<tr>${r.map(v => `<td>${v}</td>`).join("")}</tr>`).join("");

                preview.classList.add("show");
            };
            reader.readAsText(blob);
        }

        // Download
        downloadBtn.addEventListener("click", () => {
            const url = window.URL.createObjectURL(cleanedBlob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "cleaned_data.csv";
            document.body.appendChild(a);
            a.click();
            a.remove();
        });
    </script>

</body>
</html>
